apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gatus-web
  namespace: status-page
  labels:
    app.kubernetes.io/name: gatus-web
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: eehub-status-page
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - secretName: status-eehub-mingz-top-tls
      hosts:
        - status.eehub.mingz.top
  rules:
    - host: status.eehub.mingz.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gatus
                port:
                  number: 8080
