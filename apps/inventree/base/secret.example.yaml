# Copy this file outside git or to a *.private.yaml path, replace all values,
# then seal it with kubeseal before syncing this base.
apiVersion: v1
kind: Secret
metadata:
  name: inventree-postgresql-secret
  namespace: inventory
  labels:
    app.kubernetes.io/name: inventree-postgresql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: eehub-inventree
type: Opaque
stringData:
  POSTGRES_DB: inventree
  POSTGRES_USER: inventree
  POSTGRES_PASSWORD: change-me-postgresql-password
  INVENTREE_DB_PASSWORD: change-me-postgresql-password
---
apiVersion: v1
kind: Secret
metadata:
  name: inventree-redis-secret
  namespace: inventory
  labels:
    app.kubernetes.io/name: inventree-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: eehub-inventree
type: Opaque
stringData:
  REDIS_PASSWORD: change-me-redis-password
---
apiVersion: v1
kind: Secret
metadata:
  name: inventree-secret
  namespace: inventory
  labels:
    app.kubernetes.io/name: inventree
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: eehub-inventree
type: Opaque
stringData:
  INVENTREE_SECRET_KEY: change-me-inventree-secret-key
  INVENTREE_ADMIN_USER: admin
  INVENTREE_ADMIN_PASSWORD: change-me-inventree-admin-password
  INVENTREE_ADMIN_EMAIL: admin@eehub.mingz.top
