apiVersion: v1
kind: Service
metadata:
  name: inventree-postgresql
  namespace: inventory
  labels:
    app: inventree-postgresql
    app.kubernetes.io/name: inventree-postgresql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: eehub-inventree
spec:
  type: ClusterIP
  selector:
    app: inventree-postgresql
  ports:
    - name: postgresql
      protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: inventree-postgresql
  namespace: inventory
  labels:
    app: inventree-postgresql
    app.kubernetes.io/name: inventree-postgresql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: eehub-inventree
spec:
  serviceName: inventree-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: inventree-postgresql
  template:
    metadata:
      labels:
        app: inventree-postgresql
        app.kubernetes.io/name: inventree-postgresql
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: eehub-inventree
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgresql
          image: postgres:17-alpine
          imagePullPolicy: Always
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: inventree-postgresql-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: inventree-postgresql-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: inventree-postgresql
          app.kubernetes.io/component: database
          app.kubernetes.io/part-of: eehub-inventree
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-fast-1replica
        resources:
          requests:
            storage: 20Gi
