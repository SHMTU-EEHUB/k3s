---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: inventree-postgresql-secret
  namespace: inventory
spec:
  encryptedData:
    INVENTREE_DB_PASSWORD: 
    POSTGRES_DB: 
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      labels:
        app.kubernetes.io/component: database
        app.kubernetes.io/name: inventree-postgresql
        app.kubernetes.io/part-of: eehub-inventree
      name: inventree-postgresql-secret
      namespace: inventory
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: inventree-redis-secret
  namespace: inventory
spec:
  encryptedData:
    REDIS_PASSWORD: 
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cache
        app.kubernetes.io/name: inventree-redis
        app.kubernetes.io/part-of: eehub-inventree
      name: inventree-redis-secret
      namespace: inventory
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: inventree-secret
  namespace: inventory
spec:
  encryptedData:
    INVENTREE_ADMIN_EMAIL: 
    INVENTREE_ADMIN_PASSWORD: 
    INVENTREE_ADMIN_USER: 
    INVENTREE_SECRET_KEY: 
  template:
    metadata:
      labels:
        app.kubernetes.io/component: application
        app.kubernetes.io/name: inventree
        app.kubernetes.io/part-of: eehub-inventree
      name: inventree-secret
      namespace: inventory
    type: Opaque
