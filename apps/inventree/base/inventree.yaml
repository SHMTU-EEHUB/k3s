apiVersion: v1
kind: ConfigMap
metadata:
  name: inventree-config
  namespace: inventory
  labels:
    app.kubernetes.io/name: inventree
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: eehub-inventree
data:
  INVENTREE_SITE_URL: https://inventory.eehub.mingz.top
  INVENTREE_LANGUAGE: zh-hans
  INVENTREE_SOCIAL_BACKENDS: allauth.socialaccount.providers.openid_connect
  INVENTREE_LOGIN_DEFAULT_HTTP_PROTOCOL: https
  INVENTREE_EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
  INVENTREE_EMAIL_SENDER: inventree@eehub.local
  INVENTREE_WEB_PORT: "8000"
  INVENTREE_USE_X_FORWARDED_HOST: "True"
  INVENTREE_USE_X_FORWARDED_PORT: "True"
  INVENTREE_USE_X_FORWARDED_PROTO: "True"
  INVENTREE_LOG_LEVEL: WARNING
  INVENTREE_PLUGINS_ENABLED: "True"
  INVENTREE_AUTO_UPDATE: "True"
  INVENTREE_DB_ENGINE: postgresql
  INVENTREE_DB_NAME: inventree
  INVENTREE_DB_HOST: inventree-postgresql
  INVENTREE_DB_PORT: "5432"
  INVENTREE_DB_USER: inventree
  INVENTREE_CACHE_ENABLED: "True"
  INVENTREE_CACHE_HOST: inventree-redis
  INVENTREE_CACHE_PORT: "6379"
  INVENTREE_MEDIA_ROOT: /home/inventree/data/media
  INVENTREE_STATIC_ROOT: /home/inventree/data/static
  INVENTREE_BACKUP_DIR: /home/inventree/data/backup
  INVENTREE_GUNICORN_TIMEOUT: "90"
  TZ: Asia/Shanghai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventree-caddy-config
  namespace: inventory
  labels:
    app.kubernetes.io/name: inventree-proxy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: eehub-inventree
data:
  Caddyfile: |
    :8080 {
      log {
        output file /var/log/caddy/inventree.access.log
      }

      encode gzip

      request_body {
        max_size 100MB
      }

      respond /healthz 200

      handle_path /static/* {
        header Allow GET,HEAD,OPTIONS
        header Access-Control-Allow-Origin *
        header Access-Control-Allow-Methods GET,HEAD,OPTIONS
        header Access-Control-Allow-Headers Authorization,Content-Type,User-Agent,traceparent

        @static_preflight method OPTIONS
        handle @static_preflight {
          respond "" 204
        }

        root * /var/www/static
        file_server
      }

      handle_path /media/* {
        header Allow GET,HEAD,OPTIONS
        header Access-Control-Allow-Origin *
        header Access-Control-Allow-Methods GET,HEAD,OPTIONS
        header Access-Control-Allow-Headers Authorization,Content-Type,User-Agent,traceparent
        header Content-Disposition attachment

        @media_preflight method OPTIONS
        handle @media_preflight {
          respond "" 204
        }

        root * /var/www/media
        file_server

        forward_auth {$INVENTREE_SERVER} {
          uri /auth/
          header_up Host {host}
          header_up X-Forwarded-Proto https
          header_up X-Forwarded-Host {host}
          header_up X-Forwarded-Port 443
        }
      }

      reverse_proxy {$INVENTREE_SERVER} {
        header_up Host {host}
        header_up X-Forwarded-Proto https
        header_up X-Forwarded-Host {host}
        header_up X-Forwarded-Port 443
      }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: inventree-data
  namespace: inventory
  labels:
    app.kubernetes.io/name: inventree
    app.kubernetes.io/component: app-data
    app.kubernetes.io/part-of: eehub-inventree
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-hdd-1replica
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: inventree-server
  namespace: inventory
  labels:
    app: inventree-server
    app.kubernetes.io/name: inventree-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: eehub-inventree
spec:
  type: ClusterIP
  selector:
    app: inventree-server
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: inventree-proxy
  namespace: inventory
  labels:
    app: inventree-proxy
    app.kubernetes.io/name: inventree-proxy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: eehub-inventree
spec:
  type: ClusterIP
  selector:
    app: inventree-proxy
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventree-server
  namespace: inventory
  labels:
    app: inventree-server
    app.kubernetes.io/name: inventree-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: eehub-inventree
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventree-server
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        eehub.mingz.top/config-revision: inventree-console-email-20260525
      labels:
        app: inventree-server
        app.kubernetes.io/name: inventree-server
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: eehub-inventree
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: prepare-data
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - mkdir -p /home/inventree/data/media /home/inventree/data/static /home/inventree/data/backup /home/inventree/data/caddy/log /home/inventree/data/caddy/data /home/inventree/data/caddy/config
          volumeMounts:
            - name: data
              mountPath: /home/inventree/data
        - name: inventree-update
          image: inventree/inventree:stable
          imagePullPolicy: Always
          args:
            - invoke
            - update
            - --skip-backup
            - --frontend
          envFrom:
            - configMapRef:
                name: inventree-config
          env:
            - name: INVENTREE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-postgresql-secret
                  key: INVENTREE_DB_PASSWORD
            - name: INVENTREE_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-redis-secret
                  key: REDIS_PASSWORD
            - name: INVENTREE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: INVENTREE_SECRET_KEY
            - name: INVENTREE_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: INVENTREE_ADMIN_USER
            - name: INVENTREE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: INVENTREE_ADMIN_PASSWORD
            - name: INVENTREE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: INVENTREE_ADMIN_EMAIL
          volumeMounts:
            - name: data
              mountPath: /home/inventree/data
      containers:
        - name: inventree-server
          image: inventree/inventree:stable
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: inventree-config
          env:
            - name: INVENTREE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-postgresql-secret
                  key: INVENTREE_DB_PASSWORD
            - name: INVENTREE_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-redis-secret
                  key: REDIS_PASSWORD
            - name: INVENTREE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: INVENTREE_SECRET_KEY
            - name: INVENTREE_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: INVENTREE_ADMIN_USER
            - name: INVENTREE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: INVENTREE_ADMIN_PASSWORD
            - name: INVENTREE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: INVENTREE_ADMIN_EMAIL
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /api/
              port: http
              httpHeaders:
                - name: Host
                  value: inventory.eehub.mingz.top
                - name: X-Forwarded-Proto
                  value: https
                - name: X-Forwarded-Host
                  value: inventory.eehub.mingz.top
                - name: X-Forwarded-Port
                  value: "443"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/
              port: http
              httpHeaders:
                - name: Host
                  value: inventory.eehub.mingz.top
                - name: X-Forwarded-Proto
                  value: https
                - name: X-Forwarded-Host
                  value: inventory.eehub.mingz.top
                - name: X-Forwarded-Port
                  value: "443"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/
              port: http
              httpHeaders:
                - name: Host
                  value: inventory.eehub.mingz.top
                - name: X-Forwarded-Proto
                  value: https
                - name: X-Forwarded-Host
                  value: inventory.eehub.mingz.top
                - name: X-Forwarded-Port
                  value: "443"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /home/inventree/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: inventree-data
---
