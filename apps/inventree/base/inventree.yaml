---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventree-proxy
  namespace: inventory
  labels:
    app: inventree-proxy
    app.kubernetes.io/name: inventree-proxy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: eehub-inventree
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventree-proxy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: inventree-proxy
        app.kubernetes.io/name: inventree-proxy
        app.kubernetes.io/component: proxy
        app.kubernetes.io/part-of: eehub-inventree
    spec:
      automountServiceAccountToken: false
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: inventree-server
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: prepare-data
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - mkdir -p /mnt/inventree-data/media /mnt/inventree-data/static /mnt/inventree-data/backup /mnt/inventree-data/caddy/log /mnt/inventree-data/caddy/data /mnt/inventree-data/caddy/config
          volumeMounts:
            - name: data
              mountPath: /mnt/inventree-data
      containers:
        - name: caddy
          image: caddy:alpine
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: INVENTREE_SERVER
              value: http://inventree-server:8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/
              port: http
              httpHeaders:
                - name: Host
                  value: inventory.eehub.mingz.top
                - name: X-Forwarded-Proto
                  value: https
                - name: X-Forwarded-Host
                  value: inventory.eehub.mingz.top
                - name: X-Forwarded-Port
                  value: "443"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: data
              mountPath: /var/www/static
              subPath: static
              readOnly: true
            - name: data
              mountPath: /var/www/media
              subPath: media
              readOnly: true
            - name: data
              mountPath: /var/log/caddy
              subPath: caddy/log
            - name: data
              mountPath: /data
              subPath: caddy/data
            - name: data
              mountPath: /config
              subPath: caddy/config
      volumes:
        - name: caddy-config
          configMap:
            name: inventree-caddy-config
        - name: data
          persistentVolumeClaim:
            claimName: inventree-data

