apiVersion: batch/v1
kind: Job
metadata:
  name: anyrouter-check-in-proof-direct-20260717-02
  namespace: ai-services
  annotations:
    argocd.argoproj.io/sync-wave: "100"
  labels:
    app.kubernetes.io/name: anyrouter-check-in-proof
    app.kubernetes.io/instance: anyrouter-check-in-proof-direct-20260717-02
    app.kubernetes.io/component: direct-egress-proof
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 0
  activeDeadlineSeconds: 720
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anyrouter-check-in-proof
        app.kubernetes.io/instance: anyrouter-check-in-proof-direct-20260717-02
        app.kubernetes.io/component: direct-egress-proof
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      terminationGracePeriodSeconds: 20
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: anyrouter-check-in-proof
          image: ghcr.io/zjm54321/anyrouter-reference-proof:a21879410c6c0cd113d277162d800288951df650@sha256:30a077d3b372dd72b8a87f90e051f7a84cf517958dd9d4a517159638c4daedd6
          imagePullPolicy: IfNotPresent
          command: ["/usr/bin/timeout"]
          args:
            - --signal=TERM
            - --kill-after=10s
            - 600s
            - /usr/bin/xvfb-run
            - -a
            - .venv/bin/python
            - proof_checkin.py
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: ANYROUTER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: anyrouter-check-in-once
                  key: email
            - name: ANYROUTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: anyrouter-check-in-once
                  key: password
            - name: PROOF_MODE
              value: "true"
            - name: PROOF_PROGRESS
              value: "true"
            - name: PROOF_PROXY_MODE
              value: direct
            - name: PROOF_EGRESS_URL
              value: https://api64.ipify.org?format=json
            - name: PROOF_EGRESS_SALT
              valueFrom:
                configMapKeyRef:
                  name: anyrouter-check-in-proof-direct-20260717-02
                  key: PROOF_EGRESS_SALT
            - name: CHECKIN_HEADLESS
              value: "false"
            - name: CHECKIN_HUMANIZE
              value: "true"
            - name: CHECKIN_WAIT_TIMEOUT_MS
              value: "120000"
            - name: CLOAKBROWSER_AUTO_UPDATE
              value: "false"
            - name: HOME
              value: /home/cloak
            - name: XDG_CONFIG_HOME
              value: /home/cloak/.config
            - name: XDG_CACHE_HOME
              value: /home/cloak/.cache
            - name: XDG_RUNTIME_DIR
              value: /home/cloak/.runtime
            - name: TMPDIR
              value: /home/cloak
            - name: HTTP_PROXY
              value: ""
            - name: HTTPS_PROXY
              value: ""
            - name: ALL_PROXY
              value: ""
            - name: http_proxy
              value: ""
            - name: https_proxy
              value: ""
            - name: all_proxy
              value: ""
            - name: NO_PROXY
              value: ""
            - name: no_proxy
              value: ""
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: runtime
              mountPath: /tmp
            - name: shared-memory
              mountPath: /dev/shm
            - name: browser-home
              mountPath: /home/cloak
      volumes:
        - name: runtime
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        - name: browser-home
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
