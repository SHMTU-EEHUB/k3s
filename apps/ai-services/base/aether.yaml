apiVersion: v1
kind: Service
metadata:
  name: aether
  namespace: ai-services
  labels:
    app: aether
    app.kubernetes.io/name: aether
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: NodePort
  selector:
    app: aether
  ports:
    - name: http
      protocol: TCP
      port: 8084
      targetPort: 8084
      nodePort: 30884
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aether
  namespace: ai-services
  labels:
    app: aether
    app.kubernetes.io/name: aether
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aether
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: aether
        app.kubernetes.io/name: aether
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: init-aether-database
          image: postgres:16-alpine
          imagePullPolicy: Always
          command:
            - sh
            - -ec
            - |
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "waiting for ai-postgresql..."
                sleep 2
              done

              export PGPASSWORD="$POSTGRES_PASSWORD"
              psql -v ON_ERROR_STOP=1 \
                -h "$POSTGRES_HOST" \
                -p "$POSTGRES_PORT" \
                -U "$POSTGRES_USER" \
                -d "$POSTGRES_DB" \
                --set=aether_password="$AETHER_DB_PASSWORD" <<'SQL'
              SELECT format('CREATE ROLE aether LOGIN PASSWORD %L', :'aether_password')
              WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'aether')
              \gexec

              SELECT format('ALTER ROLE aether LOGIN PASSWORD %L', :'aether_password')
              WHERE EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'aether')
              \gexec

              SELECT 'CREATE DATABASE aether OWNER aether'
              WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'aether')
              \gexec

              ALTER DATABASE aether OWNER TO aether;
              GRANT ALL PRIVILEGES ON DATABASE aether TO aether;
              SQL
          env:
            - name: POSTGRES_HOST
              value: ai-postgresql.ai-services.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: AETHER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aether-secret
                  key: AETHER_DB_PASSWORD
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      containers:
        - name: aether
          image: ghcr.io/fawney19/aether:0.7.8@sha256:6fbafc539b3429c4bcb5bf268e2662287bdbc1feb51b7859f3ec9c4b04e15577
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
          env:
            - name: APP_PORT
              value: "8084"
            - name: API_KEY_PREFIX
              value: sk
            - name: RUST_LOG
              value: aether_gateway=info
            - name: CORS_ORIGINS
              value: http://ai.eehub.mingz.top,https://ai.eehub.mingz.top
            - name: AETHER_GATEWAY_AUTO_PREPARE_DATABASE
              value: "true"
            - name: AETHER_GATEWAY_DEPLOYMENT_TOPOLOGY
              value: single-node
            - name: AETHER_GATEWAY_NODE_ROLE
              value: all
            - name: AETHER_LOG_DESTINATION
              value: both
            - name: AETHER_LOG_FORMAT
              value: pretty
            - name: AETHER_LOG_DIR
              value: /app/logs
            - name: AETHER_LOG_ROTATION
              value: daily
            - name: AETHER_LOG_RETENTION_DAYS
              value: "7"
            - name: AETHER_LOG_MAX_FILES
              value: "30"
            - name: TZ
              value: Asia/Shanghai
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aether-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aether-secret
                  key: REDIS_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aether-secret
                  key: JWT_SECRET_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: aether-secret
                  key: ENCRYPTION_KEY
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: aether-secret
                  key: ADMIN_EMAIL
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aether-secret
                  key: ADMIN_USERNAME
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aether-secret
                  key: ADMIN_PASSWORD
            - name: HTTP_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: HTTPS_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: ALL_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.cluster.local,ai-postgresql,ai-postgresql.ai-services.svc,ai-postgresql.ai-services.svc.cluster.local,aether-redis,aether-redis.ai-services.svc,aether-redis.ai-services.svc.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: http_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: https_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: all_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.cluster.local,ai-postgresql,ai-postgresql.ai-services.svc,ai-postgresql.ai-services.svc.cluster.local,aether-redis,aether-redis.ai-services.svc,aether-redis.ai-services.svc.cluster.local,172.24.0.0/16,172.25.0.0/16
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
