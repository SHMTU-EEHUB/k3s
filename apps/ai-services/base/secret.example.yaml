apiVersion: v1
kind: Secret
metadata:
  name: ai-postgresql-secret
  namespace: ai-services
  labels:
    app.kubernetes.io/name: ai-postgresql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: eehub-ai-services
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me-postgres-admin-password
  AXONHUB_DB_PASSWORD: change-me-axonhub-db-password
  METAPI_DB_PASSWORD: change-me-metapi-db-password
---
apiVersion: v1
kind: Secret
metadata:
  name: axonhub-secret
  namespace: ai-services
  labels:
    app.kubernetes.io/name: axonhub
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: eehub-ai-services
type: Opaque
stringData:
  AXONHUB_DB_DSN: postgres://axonhub:change-me-url-encoded-axonhub-db-password@ai-postgresql.ai-services.svc.cluster.local:5432/axonhub?sslmode=disable
---
apiVersion: v1
kind: Secret
metadata:
  name: metapi-secret
  namespace: ai-services
  labels:
    app.kubernetes.io/name: metapi
    app.kubernetes.io/component: meta-aggregation
    app.kubernetes.io/part-of: eehub-ai-services
type: Opaque
stringData:
  AUTH_TOKEN: change-me-metapi-admin-token
  PROXY_TOKEN: change-me-metapi-proxy-token
  ACCOUNT_CREDENTIAL_SECRET: change-me-32-byte-random-secret
  DB_URL: postgres://metapi:change-me-url-encoded-metapi-db-password@ai-postgresql.ai-services.svc.cluster.local:5432/metapi?sslmode=disable
---
apiVersion: v1
kind: Secret
metadata:
  name: kiro-rs-secret
  namespace: ai-services
  labels:
    app.kubernetes.io/name: kiro-rs
    app.kubernetes.io/component: kiro-reverse-proxy
    app.kubernetes.io/part-of: eehub-ai-services
type: Opaque
stringData:
  config.json: |
    {
      "host": "0.0.0.0",
      "port": 8990,
      "apiKey": "change-me-kiro-api-key",
      "adminApiKey": "change-me-kiro-admin-api-key",
      "region": "us-east-1",
      "tlsBackend": "rustls",
      "defaultEndpoint": "ide",
      "proxyUrl": "http://mihomo-clean-provider-1.default.svc.cluster.local:7896"
    }
  credentials.json: |
    []
---
apiVersion: v1
kind: Secret
metadata:
  name: cli-proxy-api-secret
  namespace: ai-services
  labels:
    app.kubernetes.io/name: cli-proxy-api
    app.kubernetes.io/component: codex-reverse-proxy
    app.kubernetes.io/part-of: eehub-ai-services
type: Opaque
stringData:
  config.yaml: |
    host: ""
    port: 8317

    remote-management:
      allow-remote: true
      secret-key: "change-me-cpa-management-key"
      disable-control-panel: false

    auth-dir: "/root/.cli-proxy-api"

    api-keys:
      - "change-me-cpa-api-key"

    debug: false
    logging-to-file: false
    usage-statistics-enabled: false
    proxy-url: "http://mihomo-proxy-nodeport.default.svc.cluster.local:7897"
    request-retry: 3

    routing:
      strategy: "round-robin"
      session-affinity: false
