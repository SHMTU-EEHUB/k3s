---
apiVersion: v1
kind: Secret
metadata:
  name: cli-proxy-api-secret
  namespace: ai-services
  labels:
    app.kubernetes.io/name: cli-proxy-api
    app.kubernetes.io/component: codex-reverse-proxy
    app.kubernetes.io/part-of: eehub-ai-services
type: Opaque
stringData:
  config.yaml: |
    host: ""
    port: 8317

    remote-management:
      allow-remote: true
      secret-key: "change-me-cpa-management-key"
      disable-control-panel: false

    auth-dir: "/root/.cli-proxy-api"

    api-keys:
      - "change-me-cpa-api-key"

    debug: false
    logging-to-file: false
    usage-statistics-enabled: false
    proxy-url: "http://mihomo-proxy-nodeport.default.svc.cluster.local:7897"
    request-retry: 3

    routing:
      strategy: "round-robin"
      session-affinity: false
---
apiVersion: v1
kind: Secret
metadata:
  name: grok2api-secret
  namespace: ai-services
  labels:
    app.kubernetes.io/name: grok2api
    app.kubernetes.io/component: grok-gateway
    app.kubernetes.io/part-of: eehub-ai-services
type: Opaque
stringData:
  bootstrap-version: "change-me-grok2api-bootstrap-version"
  config.toml: |
    [app]
    app_key = "change-me-grok2api-admin-key"
    app_url = "http://grok2api.ai-services.svc.cluster.local:8000"
    api_key = "change-me-grok2api-api-key"
    webui_enabled = false
    webui_key = ""

    [proxy.egress]
    mode = "single_proxy"
    proxy_url = "http://mihomo-proxy-nodeport.default.svc.cluster.local:7897"
    resource_proxy_url = "http://mihomo-proxy-nodeport.default.svc.cluster.local:7897"
    skip_ssl_verify = false
