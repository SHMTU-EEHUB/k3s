apiVersion: v1
kind: Secret
metadata:
  name: cli-proxy-api-secret
  namespace: ai-services
  labels:
    app.kubernetes.io/name: cli-proxy-api
    app.kubernetes.io/component: codex-reverse-proxy
    app.kubernetes.io/part-of: eehub-ai-services
type: Opaque
stringData:
  config.yaml: |
    host: ""
    port: 8317

    remote-management:
      allow-remote: true
      secret-key: "change-me-cpa-management-key"
      disable-control-panel: false

    auth-dir: "/root/.cli-proxy-api"

    api-keys:
      - "change-me-cpa-api-key"

    debug: false
    logging-to-file: false
    usage-statistics-enabled: false
    proxy-url: "http://mihomo-proxy-nodeport.default.svc.cluster.local:7897"
    request-retry: 3

    routing:
      strategy: "round-robin"
      session-affinity: false
---
apiVersion: v1
kind: Secret
metadata:
  name: grok2api-secret
  namespace: ai-services
  labels:
    app: grok2api
    app.kubernetes.io/name: grok2api
    app.kubernetes.io/component: grok-gateway
    app.kubernetes.io/part-of: eehub-ai-services
    app.kubernetes.io/version: v3
type: Opaque
stringData:
  config.yaml: |
    server:
      listen: 127.0.0.1:8000
      maxBodyBytes: 33554432
      readTimeout: 15m
      requestTimeout: 2h
      swaggerEnabled: false
    secrets:
      jwtSecret: replace-with-at-least-32-characters
      credentialEncryptionKey: replace-with-base64-key
    bootstrapAdmin:
      username: admin
      password: replace-with-a-strong-password
    frontend:
      publicApiBaseURL: http://127.0.0.1:8000
      staticPath: ./frontend/dist
    database:
      driver: sqlite
      sqlite:
        path: ./data/backend.db
    runtimeStore:
      driver: memory
    auth:
      accessTokenTTL: 15m
      refreshTokenTTL: 720h
      secureCookies: false
    provider:
      build:
        baseURL: https://cli-chat-proxy.grok.com/v1
        clientVersion: 0.2.93
        clientIdentifier: grok-shell
        tokenAuth: xai-grok-cli
        userAgent: "grok-shell/0.2.93 (linux; x86_64)"
      web:
        baseURL: https://grok.com
        quotaTimeout: 25s
        chatTimeout: 2m
        imageTimeout: 3m
        videoTimeout: 15m
        mediaConcurrency: 4
        allowNSFW: false
        recoveryBackoffBase: 30s
        recoveryBackoffMax: 30m
    media:
      driver: local
      local:
        path: ./data/media
---
