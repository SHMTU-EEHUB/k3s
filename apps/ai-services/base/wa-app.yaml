apiVersion: v1
kind: Service
metadata:
  name: wa-app
  namespace: ai-services
  labels:
    app: wa-app
    app.kubernetes.io/name: wa-app
    app.kubernetes.io/component: whatsapp-manager
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: wa-app
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: wa-app-grpc
  namespace: ai-services
  labels:
    app: wa-app
    app.kubernetes.io/name: wa-app
    app.kubernetes.io/component: whatsapp-manager
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: wa-app
  ports:
    - name: grpc
      protocol: TCP
      port: 50091
      targetPort: grpc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wa-app-data
  namespace: ai-services
  labels:
    app.kubernetes.io/name: wa-app
    app.kubernetes.io/component: whatsapp-manager
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-hdd-1replica
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wa-app
  namespace: ai-services
  labels:
    app: wa-app
    app.kubernetes.io/name: wa-app
    app.kubernetes.io/component: whatsapp-manager
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wa-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: wa-app
        app.kubernetes.io/name: wa-app
        app.kubernetes.io/component: whatsapp-manager
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      containers:
        - name: wa-app
          image: ghcr.io/pood1e/wa-app-service:latest@sha256:451d32317c4706a3af7c86803d153f04226d7daa47af1f36d0c63f5366e2eb49
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50091
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: WA_APP_LISTEN_ADDR
              value: :50091
            - name: WA_APP_DASHBOARD_HTTP_ADDR
              value: :8080
            - name: WA_APP_DASHBOARD_STATIC_DIR
              value: /app/dashboard/wa
            - name: WA_APP_DATA_DIR
              value: /var/lib/wa-app
            - name: WA_COMMON_PROXY
              value: http://mihomo-gpt-listener.default.svc.cluster.local:7910
            - name: HTTP_PROXY
              value: http://mihomo-gpt-listener.default.svc.cluster.local:7910
            - name: HTTPS_PROXY
              value: http://mihomo-gpt-listener.default.svc.cluster.local:7910
            - name: ALL_PROXY
              value: http://mihomo-gpt-listener.default.svc.cluster.local:7910
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: http_proxy
              value: http://mihomo-gpt-listener.default.svc.cluster.local:7910
            - name: https_proxy
              value: http://mihomo-gpt-listener.default.svc.cluster.local:7910
            - name: all_proxy
              value: http://mihomo-gpt-listener.default.svc.cluster.local:7910
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/wa-app
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wa-app-data
