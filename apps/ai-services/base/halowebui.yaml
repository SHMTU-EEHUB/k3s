apiVersion: v1
kind: Service
metadata:
  name: halowebui
  namespace: ai-services
  labels:
    app: halowebui
    app.kubernetes.io/name: halowebui
    app.kubernetes.io/component: ai-webui
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: halowebui
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: halowebui-data
  namespace: ai-services
  labels:
    app.kubernetes.io/name: halowebui
    app.kubernetes.io/component: ai-webui
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-hdd-1replica
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: halowebui
  namespace: ai-services
  labels:
    app: halowebui
    app.kubernetes.io/name: halowebui
    app.kubernetes.io/component: ai-webui
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: halowebui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: halowebui
        app.kubernetes.io/name: halowebui
        app.kubernetes.io/component: ai-webui
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: init-halowebui-database
          image: postgres:16-alpine
          imagePullPolicy: Always
          command:
            - sh
            - -ec
            - |
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "waiting for ai-postgresql..."
                sleep 2
              done

              export PGPASSWORD="$POSTGRES_PASSWORD"
              psql -v ON_ERROR_STOP=1 \
                -h "$POSTGRES_HOST" \
                -p "$POSTGRES_PORT" \
                -U "$POSTGRES_USER" \
                -d "$POSTGRES_DB" \
                --set=halowebui_password="$HALOWEBUI_DB_PASSWORD" <<'SQL'
              SELECT format('CREATE ROLE halowebui LOGIN PASSWORD %L', :'halowebui_password')
              WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'halowebui')
              \gexec

              SELECT format('ALTER ROLE halowebui LOGIN PASSWORD %L', :'halowebui_password')
              WHERE EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'halowebui')
              \gexec

              SELECT 'CREATE DATABASE halowebui OWNER halowebui'
              WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'halowebui')
              \gexec

              ALTER DATABASE halowebui OWNER TO halowebui;
              GRANT ALL PRIVILEGES ON DATABASE halowebui TO halowebui;
              SQL
          env:
            - name: POSTGRES_HOST
              value: ai-postgresql.ai-services.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: HALOWEBUI_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: halowebui-secret
                  key: HALOWEBUI_DB_PASSWORD
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      containers:
        - name: halowebui
          image: ghcr.io/ztx888/halowebui:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: TZ
              value: Asia/Shanghai
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: halowebui-secret
                  key: WEBUI_SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: halowebui-secret
                  key: DATABASE_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-services-redis-secret
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@ai-services-redis.ai-services.svc.cluster.local:6379/2"
            - name: WEBSOCKET_MANAGER
              value: redis
            - name: WEBSOCKET_REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@ai-services-redis.ai-services.svc.cluster.local:6379/2"
            - name: WEBUI_SESSION_COOKIE_SECURE
              value: "true"
            - name: WEBUI_AUTH_COOKIE_SECURE
              value: "true"
            - name: SCARF_NO_ANALYTICS
              value: "true"
            - name: DO_NOT_TRACK
              value: "true"
            - name: ANONYMIZED_TELEMETRY
              value: "false"
            - name: REQUESTS_VERIFY
              value: "true"
            - name: AIOHTTP_CLIENT_SESSION_SSL
              value: "true"
            - name: HTTP_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: HTTPS_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: ALL_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.cluster.local,ai-postgresql,ai-postgresql.ai-services.svc,ai-postgresql.ai-services.svc.cluster.local,ai-services-redis,ai-services-redis.ai-services.svc,ai-services-redis.ai-services.svc.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: http_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: https_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: all_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.cluster.local,ai-postgresql,ai-postgresql.ai-services.svc,ai-postgresql.ai-services.svc.cluster.local,ai-services-redis,ai-services-redis.ai-services.svc,ai-services-redis.ai-services.svc.cluster.local,172.24.0.0/16,172.25.0.0/16
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: halowebui-data
