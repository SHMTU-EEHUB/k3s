apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: anyrouter-credential-seal-20260717-01
  namespace: ai-services
  labels:
    app.kubernetes.io/name: anyrouter-credential-sealer
    app.kubernetes.io/instance: anyrouter-credential-seal-20260717-01
    app.kubernetes.io/component: credential-sealing
