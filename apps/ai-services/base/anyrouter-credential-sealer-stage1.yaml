apiVersion: batch/v1
kind: Job
metadata:
  name: anyrouter-credential-seal-20260717-01
  namespace: ai-services
  annotations:
    argocd.argoproj.io/sync-wave: "90"
  labels:
    app.kubernetes.io/name: anyrouter-credential-sealer
    app.kubernetes.io/instance: anyrouter-credential-seal-20260717-01
    app.kubernetes.io/component: credential-sealing
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 0
  activeDeadlineSeconds: 180
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anyrouter-credential-sealer
        app.kubernetes.io/instance: anyrouter-credential-seal-20260717-01
        app.kubernetes.io/component: credential-sealing
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: credential-sealer
          image: ghcr.io/zjm54321/credential-sealer:9b9e55bb2b857f776e8661140b0de33d45a6ca0e@sha256:80841501eb14954113c15411012d9e4baca587d0b4107789b437062faa8a28a9
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: metapi-secret
                  key: DB_URL
            - name: ACCOUNT_CREDENTIAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: metapi-secret
                  key: ACCOUNT_CREDENTIAL_SECRET
            - name: AUTHORIZED_ACCOUNT_ID
              value: "11"
            - name: AUTHORIZED_SITE_ID
              value: "8"
            - name: SEALED_SECRETS_CERT_PATH
              value: /etc/credential-sealer/pub-cert.pem
            - name: SEALED_SECRETS_CERT_SHA256
              value: 1b79ae46e6f8d45bef750b43b25183f8f0e3a2999c6acb9744acb2be9c9197ad
            - name: GOTRACEBACK
              value: none
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: seal-cert
              mountPath: /etc/credential-sealer/pub-cert.pem
              subPath: pub-cert.pem
              readOnly: true
      volumes:
        - name: seal-cert
          configMap:
            name: anyrouter-credential-sealer-cert-20260717-01
