spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: anyrouter-credential-sealer
      app.kubernetes.io/instance: anyrouter-credential-seal-20260717-01
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: ai-postgresql
      ports:
        - protocol: TCP
          port: 5432
