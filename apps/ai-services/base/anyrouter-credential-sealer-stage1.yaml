spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: anyrouter-credential-sealer
      app.kubernetes.io/instance: anyrouter-credential-seal-20260712-02
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
