apiVersion: v1
kind: Service
metadata:
  name: cli-proxy-api
  namespace: ai-services
  labels:
    app: cli-proxy-api
    app.kubernetes.io/name: cli-proxy-api
    app.kubernetes.io/component: codex-reverse-proxy
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: cli-proxy-api
  ports:
    - name: http
      protocol: TCP
      port: 8317
      targetPort: 8317
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cli-proxy-api-data
  namespace: ai-services
  labels:
    app.kubernetes.io/name: cli-proxy-api
    app.kubernetes.io/component: codex-reverse-proxy
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-hdd-1replica
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cli-proxy-api
  namespace: ai-services
  labels:
    app: cli-proxy-api
    app.kubernetes.io/name: cli-proxy-api
    app.kubernetes.io/component: codex-reverse-proxy
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cli-proxy-api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cli-proxy-api
        app.kubernetes.io/name: cli-proxy-api
        app.kubernetes.io/component: codex-reverse-proxy
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: prepare-config
          image: busybox:1.38.0
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /data/auths
              cp /secret/config.yaml /data/config.yaml
              chmod 600 /data/config.yaml
          volumeMounts:
            - name: data
              mountPath: /data
            - name: secret-config
              mountPath: /secret
              readOnly: true
      containers:
        - name: cli-proxy-api
          image: eceasy/cli-proxy-api:v7.2.15@sha256:4af868d162d2c42c09eee817a7c9dc5d0726ee0bca86b65ac1b7032afb22b13c
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8317
              protocol: TCP
          env:
            - name: DEPLOY
              value: kubernetes
            - name: HTTP_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: HTTPS_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: ALL_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: http_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: https_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: all_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8317
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8317
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /CLIProxyAPI/config.yaml
              subPath: config.yaml
            - name: data
              mountPath: /root/.cli-proxy-api
              subPath: auths
      volumes:
        - name: secret-config
          secret:
            secretName: cli-proxy-api-secret
        - name: data
          persistentVolumeClaim:
            claimName: cli-proxy-api-data
