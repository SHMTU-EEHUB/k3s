apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aether-web
  namespace: ai-services
  labels:
    app.kubernetes.io/name: aether-web
    app.kubernetes.io/part-of: eehub-ai-services
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - secretName: ai-eehub-mingz-top-tls
      hosts:
        - ai.eehub.mingz.top
  rules:
    - host: ai.eehub.mingz.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aether
                port:
                  number: 8084
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metaapi-web
  namespace: ai-services
  labels:
    app.kubernetes.io/name: metaapi-web
    app.kubernetes.io/part-of: eehub-ai-services
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: metaapi.eehub.mingz.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: metapi
                port:
                  number: 4000
