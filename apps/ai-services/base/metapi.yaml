apiVersion: v1
kind: Service
metadata:
  name: metapi
  namespace: ai-services
  labels:
    app: metapi
    app.kubernetes.io/name: metapi
    app.kubernetes.io/component: meta-aggregation
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: metapi
  ports:
    - name: http
      protocol: TCP
      port: 4000
      targetPort: 4000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metapi-data
  namespace: ai-services
  labels:
    app.kubernetes.io/name: metapi
    app.kubernetes.io/component: meta-aggregation
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-hdd-1replica
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metapi
  namespace: ai-services
  labels:
    app: metapi
    app.kubernetes.io/name: metapi
    app.kubernetes.io/component: meta-aggregation
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metapi
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: metapi
        app.kubernetes.io/name: metapi
        app.kubernetes.io/component: meta-aggregation
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      containers:
        - name: metapi
          image: 1467078763/metapi:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: PORT
              value: "4000"
            - name: DATA_DIR
              value: /app/data
            - name: TZ
              value: Asia/Shanghai
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: metapi-secret
                  key: AUTH_TOKEN
            - name: PROXY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: metapi-secret
                  key: PROXY_TOKEN
            - name: ACCOUNT_CREDENTIAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: metapi-secret
                  key: ACCOUNT_CREDENTIAL_SECRET
            - name: DB_TYPE
              value: postgres
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: metapi-secret
                  key: DB_URL
            - name: DB_SSL
              value: "false"
            - name: CHECKIN_CRON
              value: "0 8 * * *"
            - name: BALANCE_REFRESH_CRON
              value: "0 * * * *"
            - name: MODEL_AVAILABILITY_PROBE_ENABLED
              value: "false"
            - name: MODEL_AVAILABILITY_PROBE_CONCURRENCY
              value: "1"
            - name: SYSTEM_PROXY_URL
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: HTTP_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: HTTPS_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: ALL_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.cluster.local,ai-postgresql,ai-postgresql.ai-services.svc,ai-postgresql.ai-services.svc.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: http_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: https_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: all_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.cluster.local,ai-postgresql,ai-postgresql.ai-services.svc,ai-postgresql.ai-services.svc.cluster.local,172.24.0.0/16,172.25.0.0/16
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: metapi-data
