apiVersion: v1
kind: Service
metadata:
  name: grok2api
  namespace: ai-services
  labels:
    app: grok2api
    app.kubernetes.io/name: grok2api
    app.kubernetes.io/component: grok-gateway
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: grok2api
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grok2api-data
  namespace: ai-services
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
  labels:
    app: grok2api
    app.kubernetes.io/name: grok2api
    app.kubernetes.io/component: grok-gateway
    app.kubernetes.io/part-of: eehub-ai-services
    app.kubernetes.io/version: v3
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-hdd-1replica
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grok2api
  namespace: ai-services
  labels:
    app: grok2api
    app.kubernetes.io/name: grok2api
    app.kubernetes.io/component: grok-gateway
    app.kubernetes.io/part-of: eehub-ai-services
    app.kubernetes.io/version: v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grok2api
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        grok2api/config-revision: "1"
      labels:
        app: grok2api
        app.kubernetes.io/name: grok2api
        app.kubernetes.io/component: grok-gateway
        app.kubernetes.io/part-of: eehub-ai-services
        app.kubernetes.io/version: v3
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: prepare-data
          image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          imagePullPolicy: Always
          command:
            - sh
            - -ec
            - mkdir -p /app/data && chown 10001:10001 /app/data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: grok2api
          image: ghcr.io/chenyme/grok2api:v3.0.4@sha256:9b42950c9fd65f74009d2b62d4244c95b0bc777f54aa20bd86cda1f088784a76
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: HTTP_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: HTTPS_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: ALL_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: http_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: https_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: all_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.cluster.local,kubernetes.default.svc,172.24.0.0/16,172.25.0.0/16
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.cluster.local,kubernetes.default.svc,172.24.0.0/16,172.25.0.0/16
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - SETUID
                - SETGID
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: secret-config
              mountPath: /run/grok2api
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grok2api-data
        - name: secret-config
          secret:
            secretName: grok2api-secret
            defaultMode: 0400
            items:
              - key: config.yaml
                path: config.yaml
