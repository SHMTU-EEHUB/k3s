apiVersion: v1
kind: Service
metadata:
  name: ds2api
  namespace: ai-services
  labels:
    app: ds2api
    app.kubernetes.io/name: ds2api
    app.kubernetes.io/component: deepseek-middleware
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: ds2api
  ports:
    - name: http
      protocol: TCP
      port: 5001
      targetPort: 5001
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ds2api-data
  namespace: ai-services
  labels:
    app.kubernetes.io/name: ds2api
    app.kubernetes.io/component: deepseek-middleware
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-hdd-1replica
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ds2api
  namespace: ai-services
  labels:
    app: ds2api
    app.kubernetes.io/name: ds2api
    app.kubernetes.io/component: deepseek-middleware
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ds2api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ds2api
        app.kubernetes.io/name: ds2api
        app.kubernetes.io/component: deepseek-middleware
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: prepare-config
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              python - <<'PY'
              import json
              import os
              from pathlib import Path

              def identifier(acc):
                  email = str(acc.get('email', '')).strip().lower()
                  if email:
                      return email
                  mobile = str(acc.get('mobile', '')).strip()
                  return mobile

              data_path = Path('/data/config.json')
              secret_path = Path('/secret/config.json')
              with secret_path.open('r', encoding='utf-8') as f:
                  secret = json.load(f)
              existing = {}
              if data_path.exists():
                  try:
                      with data_path.open('r', encoding='utf-8') as f:
                          existing = json.load(f)
                  except Exception:
                      existing = {}

              existing_map = {}
              for acc in existing.get('accounts', []):
                  idn = identifier(acc)
                  if idn:
                      existing_map[idn] = acc

              merged_accounts = []
              for acc in secret.get('accounts', []):
                  item = dict(acc)
                  old = existing_map.get(identifier(item))
                  if old:
                      for key in ('token', 'proxy_id'):
                          if old.get(key):
                              item[key] = old.get(key)
                      for key in ('name', 'remark'):
                          if not item.get(key) and old.get(key):
                              item[key] = old.get(key)
                  merged_accounts.append(item)

              base = existing if (data_path.exists() and existing) else secret
              base['accounts'] = merged_accounts

              tmp = data_path.with_suffix('.json.tmp')
              with tmp.open('w', encoding='utf-8') as f:
                  json.dump(base, f, ensure_ascii=False, indent=2)
                  f.write('\n')
              os.replace(tmp, data_path)
              os.chown(data_path, 999, 999)
              os.chmod(data_path, 0o664)
              PY
          volumeMounts:
            - name: data
              mountPath: /data
            - name: secret-config
              mountPath: /secret
              readOnly: true
      containers:
        - name: ds2api
          image: ghcr.io/cjackhwang/ds2api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: LOG_LEVEL
              value: INFO
            - name: DS2API_CONFIG_PATH
              value: /data/config.json
            - name: DS2API_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: ds2api-secret
                  key: DS2API_ADMIN_KEY
            - name: HTTP_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: HTTPS_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: ALL_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: http_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: https_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: all_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5001
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ds2api-data
        - name: secret-config
          secret:
            secretName: ds2api-secret
