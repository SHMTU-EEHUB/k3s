apiVersion: v1
kind: Service
metadata:
  name: ds2api
  namespace: ai-services
  labels:
    app: ds2api
    app.kubernetes.io/name: ds2api
    app.kubernetes.io/component: deepseek-middleware
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: ds2api
  ports:
    - name: http
      protocol: TCP
      port: 5001
      targetPort: 5001
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ds2api-data
  namespace: ai-services
  labels:
    app.kubernetes.io/name: ds2api
    app.kubernetes.io/component: deepseek-middleware
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-hdd-1replica
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ds2api
  namespace: ai-services
  labels:
    app: ds2api
    app.kubernetes.io/name: ds2api
    app.kubernetes.io/component: deepseek-middleware
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ds2api
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ds2api
        app.kubernetes.io/name: ds2api
        app.kubernetes.io/component: deepseek-middleware
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: prepare-config
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              if [ ! -f /data/config.json ]; then
                cp /secret/config.json /data/config.json
              fi
              chmod 644 /data/config.json
          volumeMounts:
            - name: data
              mountPath: /data
            - name: secret-config
              mountPath: /secret
              readOnly: true
      containers:
        - name: ds2api
          image: ghcr.io/cjackhwang/ds2api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: LOG_LEVEL
              value: INFO
            - name: DS2API_CONFIG_PATH
              value: /data/config.json
            - name: DS2API_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: ds2api-secret
                  key: DS2API_ADMIN_KEY
            - name: HTTP_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: HTTPS_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: ALL_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: http_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: https_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: all_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5001
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ds2api-data
        - name: secret-config
          secret:
            secretName: ds2api-secret
