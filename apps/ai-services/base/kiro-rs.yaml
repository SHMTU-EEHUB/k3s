apiVersion: v1
kind: Service
metadata:
  name: kiro-rs
  namespace: ai-services
  labels:
    app: kiro-rs
    app.kubernetes.io/name: kiro-rs
    app.kubernetes.io/component: kiro-reverse-proxy
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: kiro-rs
  ports:
    - name: http
      protocol: TCP
      port: 8990
      targetPort: 8990
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kiro-rs-config
  namespace: ai-services
  labels:
    app.kubernetes.io/name: kiro-rs
    app.kubernetes.io/component: kiro-reverse-proxy
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-hdd-1replica
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiro-rs
  namespace: ai-services
  labels:
    app: kiro-rs
    app.kubernetes.io/name: kiro-rs
    app.kubernetes.io/component: kiro-reverse-proxy
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kiro-rs
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: kiro-rs
        app.kubernetes.io/name: kiro-rs
        app.kubernetes.io/component: kiro-reverse-proxy
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: prepare-config
          image: busybox:1.36
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              set -eu
              cp /secret/config.json /config/config.json
              if [ ! -f /config/credentials.json ]; then
                cp /secret/credentials.json /config/credentials.json
              fi
              chmod 600 /config/config.json /config/credentials.json
          volumeMounts:
            - name: config
              mountPath: /config
            - name: secret-config
              mountPath: /secret
              readOnly: true
      containers:
        - name: kiro-rs
          image: ghcr.io/hank9999/kiro-rs:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8990
              protocol: TCP
          env:
            - name: HTTP_PROXY
              value: http://mihomo-clean-provider-1.default.svc.cluster.local:7896
            - name: HTTPS_PROXY
              value: http://mihomo-clean-provider-1.default.svc.cluster.local:7896
            - name: ALL_PROXY
              value: http://mihomo-clean-provider-1.default.svc.cluster.local:7896
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: http_proxy
              value: http://mihomo-clean-provider-1.default.svc.cluster.local:7896
            - name: https_proxy
              value: http://mihomo-clean-provider-1.default.svc.cluster.local:7896
            - name: all_proxy
              value: http://mihomo-clean-provider-1.default.svc.cluster.local:7896
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8990
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8990
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: kiro-rs-config
        - name: secret-config
          secret:
            secretName: kiro-rs-secret
