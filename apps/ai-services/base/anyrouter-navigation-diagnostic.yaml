apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: anyrouter-navigation-diagnostic-20260718-01
  namespace: ai-services
  labels:
    app.kubernetes.io/name: anyrouter-navigation-diagnostic
    app.kubernetes.io/instance: anyrouter-navigation-diagnostic-20260718-01
    app.kubernetes.io/component: navigation-diagnostic
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: anyrouter-navigation-diagnostic
      app.kubernetes.io/instance: anyrouter-navigation-diagnostic-20260718-01
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 0.0.0.0/8
              - 10.0.0.0/8
              - 100.64.0.0/10
              - 127.0.0.0/8
              - 169.254.0.0/16
              - 172.16.0.0/12
              - 192.0.0.0/24
              - 192.0.2.0/24
              - 192.88.99.0/24
              - 192.168.0.0/16
              - 198.18.0.0/15
              - 198.51.100.0/24
              - 203.0.113.0/24
              - 224.0.0.0/4
              - 240.0.0.0/4
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: batch/v1
kind: Job
metadata:
  name: anyrouter-navigation-diagnostic-20260718-01
  namespace: ai-services
  labels:
    app.kubernetes.io/name: anyrouter-navigation-diagnostic
    app.kubernetes.io/instance: anyrouter-navigation-diagnostic-20260718-01
    app.kubernetes.io/component: navigation-diagnostic
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 0
  activeDeadlineSeconds: 240
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anyrouter-navigation-diagnostic
        app.kubernetes.io/instance: anyrouter-navigation-diagnostic-20260718-01
        app.kubernetes.io/component: navigation-diagnostic
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      terminationGracePeriodSeconds: 20
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: anyrouter-navigation-diagnostic
          image: ghcr.io/zjm54321/anyrouter-reference-proof:cf187eb445818666803dff9ddd48a15518d226cc@sha256:bb7f86a7e94500dd4fae1d9a97a1587d2bb63b25ebf276008d81608345981fb3
          imagePullPolicy: IfNotPresent
          command: ["/usr/bin/timeout"]
          args:
            - --signal=TERM
            - --kill-after=10s
            - 180s
            - /usr/bin/xvfb-run
            - -a
            - .venv/bin/python
            - proof_navigation_smoke.py
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: ANYROUTER_DIAGNOSTIC_BASE_URL
              value: https://anyrouter.top
            - name: CLOAKBROWSER_AUTO_UPDATE
              value: "false"
            - name: HOME
              value: /home/cloak
            - name: XDG_CONFIG_HOME
              value: /home/cloak/.config
            - name: XDG_CACHE_HOME
              value: /home/cloak/.cache
            - name: XDG_RUNTIME_DIR
              value: /home/cloak/.runtime
            - name: TMPDIR
              value: /home/cloak
            - name: HTTP_PROXY
              value: ""
            - name: HTTPS_PROXY
              value: ""
            - name: ALL_PROXY
              value: ""
            - name: NO_PROXY
              value: ""
            - name: http_proxy
              value: ""
            - name: https_proxy
              value: ""
            - name: all_proxy
              value: ""
            - name: no_proxy
              value: ""
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: browser-home
              mountPath: /home/cloak
            - name: runtime
              mountPath: /tmp
            - name: shared-memory
              mountPath: /dev/shm
      volumes:
        - name: browser-home
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: runtime
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
