apiVersion: v1
kind: Service
metadata:
  name: axonhub
  namespace: ai-services
  labels:
    app: axonhub
    app.kubernetes.io/name: axonhub
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: axonhub
  ports:
    - name: http
      protocol: TCP
      port: 8090
      targetPort: 8090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: axonhub
  namespace: ai-services
  labels:
    app: axonhub
    app.kubernetes.io/name: axonhub
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: axonhub
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: axonhub
        app.kubernetes.io/name: axonhub
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      containers:
        - name: axonhub
          image: looplj/axonhub:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: AXONHUB_SERVER_HOST
              value: 0.0.0.0
            - name: AXONHUB_SERVER_PORT
              value: "8090"
            - name: AXONHUB_DB_DIALECT
              value: postgres
            - name: AXONHUB_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: axonhub-secret
                  key: AXONHUB_DB_DSN
            - name: AXONHUB_LOG_LEVEL
              value: info
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
