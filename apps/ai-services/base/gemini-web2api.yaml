apiVersion: v1
kind: Service
metadata:
  name: gemini-web2api
  namespace: ai-services
  labels:
    app: gemini-web2api
    app.kubernetes.io/name: gemini-web2api
    app.kubernetes.io/component: gemini-gateway
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  type: ClusterIP
  selector:
    app: gemini-web2api
  ports:
    - name: http
      protocol: TCP
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gemini-web2api-config
  namespace: ai-services
  labels:
    app: gemini-web2api
    app.kubernetes.io/name: gemini-web2api
    app.kubernetes.io/component: gemini-gateway
    app.kubernetes.io/part-of: eehub-ai-services
data:
  config.json: |
    {
      "host": "0.0.0.0",
      "port": 8081,
      "retry_attempts": 3,
      "retry_delay_sec": 2,
      "request_timeout_sec": 180,
      "gemini_bl": "boq_assistant-bard-web-server_20260525.09_p0",
      "auth_user": null,
      "xsrf_token": null,
      "default_model": "gemini-3.5-flash",
      "api_keys": [],
      "cookie_file": null,
      "proxy": "http://mihomo-proxy-nodeport.default.svc.cluster.local:7897",
      "log_requests": true
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini-web2api
  namespace: ai-services
  labels:
    app: gemini-web2api
    app.kubernetes.io/name: gemini-web2api
    app.kubernetes.io/component: gemini-gateway
    app.kubernetes.io/part-of: eehub-ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemini-web2api
  template:
    metadata:
      labels:
        app: gemini-web2api
        app.kubernetes.io/name: gemini-web2api
        app.kubernetes.io/component: gemini-gateway
        app.kubernetes.io/part-of: eehub-ai-services
    spec:
      automountServiceAccountToken: false
      containers:
        - name: gemini-web2api
          image: ghcr.io/sophomoresty/gemini-web2api:latest@sha256:3012cde052f25f0d9ff4bcde7df333da228bb5e5baa637a368c0c82b153271ac
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: HTTP_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: HTTPS_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: ALL_PROXY
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
            - name: http_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: https_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: all_proxy
              value: http://mihomo-proxy-nodeport.default.svc.cluster.local:7897
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.cluster.local,172.24.0.0/16,172.25.0.0/16
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: gemini-web2api-config
            items:
              - key: config.json
                path: config.json
