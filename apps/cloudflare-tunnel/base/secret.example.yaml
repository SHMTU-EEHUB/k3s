# Copy this file outside git or to a *.private.yaml path, then seal it with kubeseal.
# Do not put the real tunnel token in this repository.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-aether-api-tunnel-secret
  namespace: default
type: Opaque
stringData:
  TUNNEL_TOKEN: REPLACE_WITH_AETHER_API_CLOUDFLARED_TUNNEL_TOKEN
