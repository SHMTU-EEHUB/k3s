apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-aether-api-tunnel
  namespace: default
  labels:
    app: cloudflare-aether-api-tunnel
    app.kubernetes.io/name: cloudflare-aether-api-tunnel
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/part-of: eehub-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-aether-api-tunnel
  strategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        eehub.mingz.top/cloudflare-tunnel-config-revision: aether-api-remote-v1
      labels:
        app: cloudflare-aether-api-tunnel
        app.kubernetes.io/name: cloudflare-aether-api-tunnel
        app.kubernetes.io/component: tunnel
        app.kubernetes.io/part-of: eehub-infra
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2025.7.0
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-aether-api-tunnel-secret
                  key: TUNNEL_TOKEN
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
