# This file is intentionally not referenced by kustomization.yaml until it is generated for this cluster.
# Generate it from a local unencrypted Secret, then commit only the sealed output.
#
# Expected Secret name/key:
#   metadata.name: cloudflare-ddns-secret
#   data/stringData key: CF_API_TOKEN
#
# Example generation flow:
#   1. Create a local Secret manifest outside git or as a *.private.yaml file.
#   2. Run kubeseal against the target cluster.
#   3. Replace this placeholder with the encrypted SealedSecret.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-ddns-secret
  namespace: default
spec:
  encryptedData:
    CF_API_TOKEN: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: cloudflare-ddns-secret
      namespace: default
    type: Opaque
