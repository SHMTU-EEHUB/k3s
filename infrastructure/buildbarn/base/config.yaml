apiVersion: v1
kind: ConfigMap
metadata:
  name: buildbarn-config
  namespace: buildbarn
  labels:
    app.kubernetes.io/name: buildbarn-config
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: eehub-infra
data:
  common.libsonnet: |
    {
      blobstore: {
        contentAddressableStorage: {
          sharding: {
            shards: {
              "0": {
                backend: { grpc: { client: { address: 'storage-0.storage.buildbarn:8981' } } },
                weight: 1,
              },
            },
          },
        },
        actionCache: {
          completenessChecking: {
            backend: {
              sharding: {
                shards: {
                  "0": {
                    backend: { grpc: { client: { address: 'storage-0.storage.buildbarn:8981' } } },
                    weight: 1,
                  },
                },
              },
            },
            maximumTotalTreeSizeBytes: 64 * 1024 * 1024,
          },
        },
      },
      fileSystemAccessCache: {
        sharding: {
          shards: {
            "0": {
              backend: { grpc: { client: { address: 'storage-0.storage.buildbarn:8981' } } },
              weight: 1,
            },
          },
        },
      },
      browserUrl: 'http://buildbarn-browser.buildbarn.svc.cluster.local:7984',
      maximumMessageSizeBytes: 2 * 1024 * 1024,
      global: {
        diagnosticsHttpServer: {
          httpServers: [{
            listenAddresses: [':9980'],
            authenticationPolicy: { allow: {} },
          }],
          enablePrometheus: true,
          enablePprof: true,
          enableActiveSpans: true,
        },
      },
    }
  frontend.jsonnet: |
    local common = import 'common.libsonnet';

    {
      grpcServers: [{
        listenAddresses: [':8980'],
        authenticationPolicy: { allow: {} },
      }],
      schedulers: {
        '': {
          endpoint: {
            address: 'scheduler:8982',
            addMetadataJmespathExpression: {
              expression: |||
                {
                  "build.bazel.remote.execution.v2.requestmetadata-bin": incomingGRPCMetadata."build.bazel.remote.execution.v2.requestmetadata-bin"
                }
              |||,
            },
          },
        },
      },
      maximumMessageSizeBytes: common.maximumMessageSizeBytes,
      global: common.global,
      contentAddressableStorage: {
        backend: common.blobstore.contentAddressableStorage,
        getAuthorizer: { allow: {} },
        putAuthorizer: { allow: {} },
        findMissingAuthorizer: { allow: {} },
      },
      actionCache: {
        backend: common.blobstore.actionCache,
        getAuthorizer: { allow: {} },
        putAuthorizer: { allow: {} },
      },
      fileSystemAccessCache: {
        backend: common.fileSystemAccessCache,
        getAuthorizer: { allow: {} },
        putAuthorizer: { allow: {} },
      },
      executeAuthorizer: { allow: {} },
    }
  storage.jsonnet: |
    local common = import 'common.libsonnet';

    {
      grpcServers: [{
        listenAddresses: [':8981'],
        authenticationPolicy: { allow: {} },
      }],
      maximumMessageSizeBytes: common.maximumMessageSizeBytes,
      global: common.global,
      contentAddressableStorage: {
        backend: {
          'local': {
            keyLocationMapOnBlockDevice: {
              file: {
                path: '/storage-cas/key_location_map',
                sizeBytes: 512 * 1024 * 1024,
              },
            },
            keyLocationMapMaximumGetAttempts: 16,
            keyLocationMapMaximumPutAttempts: 64,
            oldBlocks: 8,
            currentBlocks: 24,
            newBlocks: 3,
            blocksOnBlockDevice: {
              source: {
                file: {
                  path: '/storage-cas/blocks',
                  sizeBytes: 190 * 1024 * 1024 * 1024,
                },
              },
              spareBlocks: 3,
            },
            persistent: {
              stateDirectoryPath: '/storage-cas/persistent_state',
              minimumEpochInterval: '300s',
            },
          },
        },
        getAuthorizer: { allow: {} },
        putAuthorizer: { allow: {} },
        findMissingAuthorizer: { allow: {} },
      },
      actionCache: {
        backend: {
          'local': {
            keyLocationMapOnBlockDevice: {
              file: {
                path: '/storage-ac/key_location_map',
                sizeBytes: 4 * 1024 * 1024,
              },
            },
            keyLocationMapMaximumGetAttempts: 16,
            keyLocationMapMaximumPutAttempts: 64,
            oldBlocks: 8,
            currentBlocks: 24,
            newBlocks: 1,
            blocksOnBlockDevice: {
              source: {
                file: {
                  path: '/storage-ac/blocks',
                  sizeBytes: 5 * 1024 * 1024 * 1024,
                },
              },
              spareBlocks: 3,
            },
            persistent: {
              stateDirectoryPath: '/storage-ac/persistent_state',
              minimumEpochInterval: '300s',
            },
          },
        },
        getAuthorizer: { allow: {} },
        putAuthorizer: { allow: {} },
      },
      fileSystemAccessCache: {
        backend: {
          'local': {
            keyLocationMapOnBlockDevice: {
              file: {
                path: '/storage-fsac/key_location_map',
                sizeBytes: 4 * 1024 * 1024,
              },
            },
            keyLocationMapMaximumGetAttempts: 16,
            keyLocationMapMaximumPutAttempts: 64,
            oldBlocks: 8,
            currentBlocks: 24,
            newBlocks: 1,
            blocksOnBlockDevice: {
              source: {
                file: {
                  path: '/storage-fsac/blocks',
                  sizeBytes: 5 * 1024 * 1024 * 1024,
                },
              },
              spareBlocks: 3,
            },
            persistent: {
              stateDirectoryPath: '/storage-fsac/persistent_state',
              minimumEpochInterval: '300s',
            },
          },
        },
        getAuthorizer: { allow: {} },
        putAuthorizer: { allow: {} },
      },
    }
  scheduler.jsonnet: |
    local common = import 'common.libsonnet';

    {
      adminHttpServers: [{
        listenAddresses: [':7982'],
        authenticationPolicy: { allow: {} },
      }],
      clientGrpcServers: [{
        listenAddresses: [':8982'],
        authenticationPolicy: { allow: {} },
      }],
      workerGrpcServers: [{
        listenAddresses: [':8983'],
        authenticationPolicy: { allow: {} },
      }],
      buildQueueStateGrpcServers: [{
        listenAddresses: [':8984'],
        authenticationPolicy: { allow: {} },
      }],
      browserUrl: common.browserUrl,
      contentAddressableStorage: common.blobstore.contentAddressableStorage,
      maximumMessageSizeBytes: common.maximumMessageSizeBytes,
      global: common.global,
      executeAuthorizer: { allow: {} },
      modifyDrainsAuthorizer: { allow: {} },
      killOperationsAuthorizer: { allow: {} },
      synchronizeAuthorizer: { allow: {} },
      actionRouter: {
        simple: {
          platformKeyExtractor: { action: {} },
          invocationKeyExtractors: [
            { correlatedInvocationsId: {} },
            { toolInvocationId: {} },
          ],
          initialSizeClassAnalyzer: {
            defaultExecutionTimeout: '1800s',
            maximumExecutionTimeout: '7200s',
          },
        },
      },
      platformQueueWithNoWorkersTimeout: '900s',
    }
  worker-rust.jsonnet: |
    local common = import 'common.libsonnet';

    {
      blobstore: common.blobstore,
      browserUrl: common.browserUrl,
      maximumMessageSizeBytes: common.maximumMessageSizeBytes,
      scheduler: { address: 'scheduler:8983' },
      global: common.global {
        setUmask: { umask: 0 },
      },
      buildDirectories: [{
        native: {
          buildDirectoryPath: '/worker/build',
          cacheDirectoryPath: '/worker/cache',
          maximumCacheFileCount: 20000,
          maximumCacheSizeBytes: 30 * 1024 * 1024 * 1024,
          cacheReplacementPolicy: 'LEAST_RECENTLY_USED',
        },
        runners: [{
          endpoint: { address: 'unix:///worker/runner' },
          concurrency: 4,
          platform: {
            properties: [
              { name: 'OSFamily', value: 'linux' },
              { name: 'container-image', value: 'docker://docker.io/library/rust:1.94' },
            ],
          },
          workerId: {
            pod: std.extVar('POD_NAME'),
            node: std.extVar('NODE_NAME'),
          },
          environment_variables: {
            PATH: '/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin',
          },
        }],
      }],
      inputDownloadConcurrency: 8,
      outputUploadConcurrency: 8,
      directoryCache: {
        maximumCount: 2000,
        maximumSizeBytes: 10 * 1024 * 1024,
        cacheReplacementPolicy: 'LEAST_RECENTLY_USED',
      },
    }
  runner-rust.jsonnet: |
    local common = import 'common.libsonnet';

    {
      buildDirectoryPath: '/worker/build',
      grpcServers: [{
        listenPaths: ['/worker/runner'],
        authenticationPolicy: { allow: {} },
      }],
    }
