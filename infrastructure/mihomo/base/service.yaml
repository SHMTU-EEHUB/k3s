apiVersion: v1
kind: Service
metadata:
  name: clash-proxy
  namespace: default
  labels:
    app.kubernetes.io/name: mihomo
    app.kubernetes.io/component: proxy-discovery
    app.kubernetes.io/part-of: eehub-infra
spec:
  clusterIP: None
  selector:
    app: mihomo
---
apiVersion: v1
kind: Service
metadata:
  name: mihomo-proxy-nodeport
  namespace: default
  labels:
    app.kubernetes.io/name: mihomo
    app.kubernetes.io/component: mixed-proxy
    app.kubernetes.io/part-of: eehub-infra
spec:
  type: NodePort
  selector:
    app: mihomo
  ports:
    - name: mixed-proxy
      protocol: TCP
      port: 7897
      targetPort: 7897
      nodePort: 30789
---
