authentik:
  existingSecret:
    secretName: authentik-config
  error_reporting:
    enabled: false
  postgresql:
    host: authentik-postgresql
    name: authentik
    user: authentik
    port: 5432

server:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    hosts:
      - auth.eehub.mingz.top
    tls:
      - secretName: auth-eehub-mingz-top-tls
        hosts:
          - auth.eehub.mingz.top
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

worker:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

postgresql:
  enabled: true
  auth:
    username: authentik
    database: authentik
    existingSecret: authentik-config
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: longhorn-fast-1replica
      size: 10Gi
