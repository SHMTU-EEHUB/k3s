# Copy this file outside git or to a *.private.yaml path, then seal it with kubeseal.
apiVersion: v1
kind: Secret
metadata:
  name: resin-secret
  namespace: proxy
  labels:
    app: resin
    app.kubernetes.io/name: resin
    app.kubernetes.io/component: smart-proxy-gateway
    app.kubernetes.io/part-of: eehub-proxy
type: Opaque
stringData:
  RESIN_ADMIN_TOKEN: REPLACE_WITH_RESIN_ADMIN_TOKEN
  # Set to an actual token to require proxy auth. Set to "" only if proxy auth is intentionally disabled.
  RESIN_PROXY_TOKEN: REPLACE_WITH_RESIN_PROXY_TOKEN
