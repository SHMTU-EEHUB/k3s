apiVersion: apps/v1
kind: Deployment
metadata:
  name: resin
  namespace: proxy
  labels:
    app: resin
    app.kubernetes.io/name: resin
    app.kubernetes.io/component: smart-proxy-gateway
    app.kubernetes.io/part-of: eehub-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: resin
        app.kubernetes.io/name: resin
        app.kubernetes.io/component: smart-proxy-gateway
        app.kubernetes.io/part-of: eehub-proxy
    spec:
      automountServiceAccountToken: false
      containers:
        - name: resin
          image: ghcr.io/resinat/resin:1.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 2260
              protocol: TCP
          env:
            - name: RESIN_AUTH_VERSION
              value: V1
            - name: RESIN_LISTEN_ADDRESS
              value: 0.0.0.0
            - name: RESIN_PORT
              value: "2260"
            - name: RESIN_STATE_DIR
              value: /var/lib/resin
            - name: RESIN_CACHE_DIR
              value: /var/cache/resin
            - name: RESIN_LOG_DIR
              value: /var/log/resin
            - name: RESIN_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: resin-secret
                  key: RESIN_ADMIN_TOKEN
            - name: RESIN_PROXY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: resin-secret
                  key: RESIN_PROXY_TOKEN
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: state
              mountPath: /var/lib/resin
            - name: cache
              mountPath: /var/cache/resin
            - name: log
              mountPath: /var/log/resin
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: resin-state
        - name: cache
          emptyDir: {}
        - name: log
          emptyDir: {}
