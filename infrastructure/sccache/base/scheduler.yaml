apiVersion: v1
kind: Service
metadata:
  name: sccache-scheduler
  namespace: sccache
  labels:
    app: sccache-scheduler
    app.kubernetes.io/name: sccache-scheduler
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: eehub-infra
spec:
  type: ClusterIP
  selector:
    app: sccache-scheduler
  ports:
    - name: scheduler
      protocol: TCP
      port: 10600
      targetPort: 10600
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sccache-scheduler
  namespace: sccache
  labels:
    app: sccache-scheduler
    app.kubernetes.io/name: sccache-scheduler
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: eehub-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sccache-scheduler
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sccache-scheduler
        app.kubernetes.io/name: sccache-scheduler
        app.kubernetes.io/component: scheduler
        app.kubernetes.io/part-of: eehub-infra
    spec:
      automountServiceAccountToken: false
      containers:
        - name: scheduler
          image: ghcr.io/zjm54321/sccache-dist:v0.15.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /config/start-scheduler.sh
          ports:
            - name: scheduler
              containerPort: 10600
              protocol: TCP
          env:
            - name: SCCACHE_SCHEDULER_PUBLIC_ADDR
              value: 0.0.0.0:10600
            - name: SCCACHE_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sccache-secret
                  key: SCCACHE_CLIENT_TOKEN
            - name: SCCACHE_SCHEDULER_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sccache-secret
                  key: SCCACHE_SCHEDULER_SECRET_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 10600
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 10600
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: work
              mountPath: /work
      volumes:
        - name: config
          configMap:
            name: sccache-scheduler-config
        - name: work
          emptyDir: {}
