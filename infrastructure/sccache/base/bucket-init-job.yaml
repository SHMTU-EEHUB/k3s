apiVersion: batch/v1
kind: Job
metadata:
  name: sccache-bucket-bootstrap
  namespace: minio
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
  labels:
    app: sccache-bucket-bootstrap
    app.kubernetes.io/name: sccache-bucket-bootstrap
    app.kubernetes.io/component: tenant-bootstrap
    app.kubernetes.io/part-of: eehub-infra
spec:
  activeDeadlineSeconds: 600
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: sccache-bucket-bootstrap
        app.kubernetes.io/name: sccache-bucket-bootstrap
        app.kubernetes.io/component: tenant-bootstrap
        app.kubernetes.io/part-of: eehub-infra
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              attempt=0
              until mc alias set local http://minio.minio.svc.cluster.local:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                attempt=$((attempt + 1))
                if [ "$attempt" -ge 60 ]; then
                  echo "Timed out waiting for MinIO API or valid root credentials" >&2
                  exit 1
                fi
                sleep 5
              done

              mc mb --ignore-existing local/sccache

              cat > /tmp/sccache-policy.json <<'EOF'
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": [
                      "s3:GetBucketLocation",
                      "s3:ListBucket",
                      "s3:ListBucketMultipartUploads"
                    ],
                    "Resource": [
                      "arn:aws:s3:::sccache"
                    ]
                  },
                  {
                    "Effect": "Allow",
                    "Action": [
                      "s3:AbortMultipartUpload",
                      "s3:DeleteObject",
                      "s3:GetObject",
                      "s3:ListMultipartUploadParts",
                      "s3:PutObject"
                    ],
                    "Resource": [
                      "arn:aws:s3:::sccache/*"
                    ]
                  }
                ]
              }
              EOF

              mc admin policy create local sccache-rw /tmp/sccache-policy.json

              mc admin user rm local "$AWS_ACCESS_KEY_ID" >/dev/null 2>&1 || true
              mc admin user add local "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"

              mc admin policy attach local sccache-rw --user "$AWS_ACCESS_KEY_ID"

              cat > /tmp/lifecycle.json <<'EOF'
              {
                "Rules": [
                  {
                    "ID": "expire-after-7-days",
                    "Status": "Enabled",
                    "Filter": { "Prefix": "" },
                    "Expiration": { "Days": 7 }
                  }
                ]
              }
              EOF

              mc ilm import local/sccache < /tmp/lifecycle.json
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: sccache-s3-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: sccache-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
